version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: estudae-postgres
    environment:
      POSTGRES_DB: estudaedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123.qwe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: